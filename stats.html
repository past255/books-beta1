<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика клуба</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --border-color: #eeeeee;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --error-color: #e74c3c;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px; /* Уменьшили максимальную ширину, так как колонок стало меньше */
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 5px;
            letter-spacing: -0.5px;
        }

        /* Оптимизация таблицы */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 10px 5px;
            border-bottom: 2px solid var(--border-color);
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 5px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            word-wrap: break-word;
        }

        /* Новое распределение ширины колонок (в сумме 100%) */
        th:nth-child(1), td:nth-child(1) { width: 50%; } /* Участник */
        th:nth-child(2), td:nth-child(2) { width: 22%; text-align: center; } /* Книг */
        th:nth-child(3), td:nth-child(3) { width: 28%; text-align: center; } /* Ср. балл */

        .user-name {
            font-weight: 600;
            color: #333;
        }

        .stat-val {
            font-weight: 700;
            color: #111;
        }

        .loader {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 15px;
        }

        /* Адаптив под узкие экраны */
        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            td { padding: 10px 4px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" class="back-btn">← Назад</a>
        <h1>Статистика</h1>
    </header>

    <table id="statsTable">
        <thead>
            <tr>
                <th>Участник</th>
                <th style="text-align: center;">Книг</th>
                <th style="text-align: center;">Балл</th>
            </tr>
        </thead>
        <tbody id="statsBody">
            <tr>
                <td colspan="3" class="loader">Загрузка статистики...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const BASE_SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlkY8pc9H77_X6JsGVqosVfcpKBbSpdVZGEA-VkHD3dZiY4iHsYOlzqVQCZzPFgT76MHpwMusVn-Do/pub?gid=774296432&single=true&output=csv";
    const SPREADSHEET_URL = BASE_SPREADSHEET_URL + "&_=" + new Date().getTime();

    function loadStats() {
        const tbody = document.getElementById('statsBody');

        Papa.parse(SPREADSHEET_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const books = results.data;
                const participants = results.meta.fields.slice(3);
                
                let statsData = [];

                participants.forEach(p => {
                    const readBooks = books.filter(b => b[p] && b[p].trim() !== "" && b[p] !== "0");
                    const count = readBooks.length;
                    
                    // Средний балл
                    const ratings = readBooks
                        .map(b => parseFloat(b[p].toString().replace(',', '.')))
                        .filter(n => !isNaN(n));
                    const avg = ratings.length > 0 
                        ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1) 
                        : '0.0';

                    statsData.push({ name: p, count, avg });
                });

                // Сортировка: сначала те, у кого больше книг
                statsData.sort((a, b) => b.count - a.count);

                tbody.innerHTML = '';

                // Отрисовка трех колонок
                statsData.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="user-name">${item.name}</td>
                        <td class="stat-val" style="text-align: center;">${item.count}</td>
                        <td class="stat-val" style="text-align: center;">${item.avg}</td>
                    `;
                    tbody.appendChild(row);
                });
            },
            error: function(err) {
                tbody.innerHTML = `<tr><td colspan="3" class="loader" style="color: var(--error-color)">Ошибка загрузки данных из Google Таблиц.</td></tr>`;
                console.error("Ошибка парсинга:", err);
            }
        });
    }

    loadStats();
</script>

</body>
</html>
