<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книжный клуб</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --border-color: #eeeeee;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --grade-5: #27ae60;
            --grade-4: #8bc34a;
            --grade-3: #f1c40f;
            --grade-2: #e67e22;
            --grade-1: #e74c3c;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        header {
            max-width: 600px;
            margin: 0 auto 25px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 20px 0;
            text-align: center;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-links a {
            color: #555;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px dashed #ccc;
        }

        .nav-links a:hover {
            color: #000;
            border-bottom-color: #000;
        }

        .filters {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-wrapper input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-family: inherit;
        }

        .filter-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .filter-controls select {
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #fff;
            font-family: inherit;
            outline: none;
        }

        .books-list {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .book-card {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .book-card:last-child {
            border-bottom: none;
        }

        .book-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 6px;
        }

        .book-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
        }

        .book-rating {
            font-size: 14px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            color: #fff;
            white-space: nowrap;
        }

        .book-author {
            font-size: 14px;
            color: #555;
            margin: 0 0 12px 0;
        }

        .grades-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .grade-badge {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            background: #f0f0f0;
            color: #333;
        }

        .grade-badge span {
            font-weight: 600;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 16px;
        }

        @media (max-width: 480px) {
            .filter-controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Книжный клуб</h1>
    <div class="nav-links">
        <a href="stats.html">Посмотреть статистику клуба →</a>
    </div>
    <div class="filters">
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="Поиск по названию или автору...">
        </div>
        <div class="filter-controls">
            <select id="user-filter">
                <option value="all">Все читатели</option>
                <option value="Антон">Антон</option>
                <option value="Андрей">Андрей</option>
                <option value="Аня">Аня</option>
                <option value="Лена В.">Лена В.</option>
                <option value="Лена Б.">Лена Б.</option>
                <option value="Дима">Дима</option>
                <option value="Надя">Надя</option>
            </select>
            <select id="status-filter">
                <option value="read">Прочитано</option>
                <option value="unread">Не прочитано</option>
            </select>
            <select id="sort-filter">
                <option value="newest">Сначала новые</option>
                <option value="oldest">Сначала старые</option>
                <option value="rating-desc">По рейтингу (высший)</option>
                <option value="rating-asc">По рейтингу (низший)</option>
            </select>
        </div>
    </div>
</header>

<main class="books-list" id="books-container">
    <div class="loader">Загрузка книг...</div>
</main>

<script>
    // Прямая ссылка на Google Таблицу (CSV-выгрузка) с защитой от кэширования браузера
    const BASE_SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlkY8pc9H77_X6JsGVqosVfcpKBbSpdVZGEA-VkHD3dZiY4iHsYOlzqVQCZzPFgT76MHpwMusVn-Do/pub?gid=774296432&single=true&output=csv";
    const SPREADSHEET_URL = BASE_SPREADSHEET_URL + "&_=" + new Date().getTime();

    let allBooks = [];
    const usersList = ['Антон', 'Андрей', 'Аня', 'Лена В.', 'Лена Б.', 'Дима', 'Надя'];

    // Определение цвета для общей оценки книги
    function getRatingColor(ratingStr) {
        const rating = parseFloat(ratingStr.replace(',', '.')) || 0;
        if (rating >= 4.5) return 'var(--grade-5)';
        if (rating >= 3.8) return 'var(--grade-4)';
        if (rating >= 3.0) return 'var(--grade-3)';
        if (rating >= 2.0) return 'var(--grade-2)';
        return 'var(--grade-1)';
    }

    // Загрузка данных
    function loadData() {
        Papa.parse(SPREADSHEET_URL, {
            download: true,
            header: true,
            skipEmptyLines: true, // Игнорировать пустые строки в конце таблицы
            complete: function(results) {
                // Добавляем оригинальный индекс для сохранения хронологии порядка добавления
                allBooks = results.data.map((book, index) => {
                    return { ...book, originalIndex: index };
                });
                applyFilters();
            },
            error: function(err) {
                document.getElementById('books-container').innerHTML = `<div class="loader" style="color:var(--grade-1)">Ошибка загрузки данных из Google Таблиц.</div>`;
                console.error(err);
            }
        });
    }

    // Отрисовка списка книг
    function renderBooks(books) {
        const container = document.getElementById('books-container');
        container.innerHTML = '';

        if (books.length === 0) {
            container.innerHTML = '<div class="loader">Книги не найдены</div>';
            return;
        }

        books.forEach(book => {
            const card = document.createElement('div');
            card.className = 'book-card';

            // Собираем оценки читателей
            let gradesHtml = '';
            usersList.forEach(user => {
                const grade = book[user];
                if (grade && grade.trim() !== "" && grade !== "0") {
                    gradesHtml += `<div class="grade-badge">${user}: <span>${grade}</span></div>`;
                }
            });

            const ratingStr = book['Оценка'] || '0,0';
            const badgeColor = getRatingColor(ratingStr);

            card.innerHTML = `
                <div class="book-header">
                    <h2 class="book-title">${book['Наименование'] || 'Без названия'}</h2>
                    <span class="book-rating" style="background-color: ${badgeColor}">${ratingStr}</span>
                </div>
                <p class="book-author">${book['Автор'] || 'Автор не указан'}</p>
                <div class="grades-grid">
                    ${gradesHtml || '<div class="grade-badge" style="color:#888; font-style:italic;">Никто еще не прочитал</div>'}
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Логика фильтрации и сортировки
    function applyFilters() {
        const search = document.getElementById('search').value.toLowerCase().trim();
        const user = document.getElementById('user-filter').value;
        const status = document.getElementById('status-filter').value;
        const sort = document.getElementById('sort-filter').value;

        let filtered = allBooks.filter(book => {
            const title = (book['Наименование'] || '').toLowerCase();
            const author = (book['Автор'] || '').toLowerCase();
            const matchSearch = title.includes(search) || author.includes(search);
            
            let matchUser = true;
            if (user !== 'all') {
                const hasRead = book[user] && book[user].trim() !== "" && book[user] !== "0";
                matchUser = (status === 'read') ? hasRead : !hasRead;
            }
            return matchSearch && matchUser;
        });

        // Логика сортировки
        if (sort === 'oldest') {
            filtered.sort((a, b) => a.originalIndex - b.originalIndex);
        } else if (sort === 'newest') {
            filtered.sort((a, b) => b.originalIndex - a.originalIndex);
        } else if (sort === 'rating-desc') {
            filtered.sort((a, b) => {
                const rateA = parseFloat(a['Оценка'].toString().replace(',', '.')) || 0;
                const rateB = parseFloat(b['Оценка'].toString().replace(',', '.')) || 0;
                return rateB - rateA;
            });
        } else if (sort === 'rating-asc') {
            filtered.sort((a, b) => {
                const rateA = parseFloat(a['Оценка'].toString().replace(',', '.')) || 0;
                const rateB = parseFloat(b['Оценка'].toString().replace(',', '.')) || 0;
                return rateA - rateB;
            });
        }

        renderBooks(filtered);
    }

    // Слушатели событий интерфейса
    document.getElementById('search').addEventListener('input', applyFilters);
    document.querySelectorAll('select').forEach(el => {
        el.addEventListener('change', applyFilters);
    });

    // Стартовая инициализация
    loadData();
</script>

</body>
</html>
